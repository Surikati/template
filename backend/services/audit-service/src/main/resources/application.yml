server:
  port: 8088

spring:
  application:
    name: audit-service
  datasource:
    url: ${AUDIT_DB_URL:jdbc:postgresql://localhost:5432/audit_service}
    username: ${AUDIT_DB_USER:audit_service}
    password: ${AUDIT_DB_PASSWORD:audit_service}
  jpa:
    open-in-view: false
    properties:
      hibernate.jdbc.time_zone: UTC
  flyway:
    enabled: true
    baseline-on-migrate: true
  rabbitmq:
    host: ${RABBITMQ_HOST:localhost}
    port: ${RABBITMQ_PORT:5672}
    username: ${RABBITMQ_USER:guest}
    password: ${RABBITMQ_PASSWORD:guest}
  security:
    oauth2:
      resourceserver:
        jwt:
          issuer-uri: ${KEYCLOAK_ISSUER_URI:http://localhost:8180/realms/tmpmgmt}

tmpmgmt:
  outbox:
    enabled: false
  audit:
    exchange: tmpmgmt.events
    queue: audit.all-events
    binding-pattern: "#"

management:
  endpoints:
    web:
      exposure:
        include: health, info, prometheus

logging:
  pattern:
    level: "%5p [%X{correlationId:-}]"

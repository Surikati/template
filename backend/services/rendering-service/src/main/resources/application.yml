server:
  port: 8085

spring:
  application:
    name: rendering-service
  autoconfigure:
    # Stateless service — no DB, no AMQP publisher.
    exclude:
      - org.springframework.boot.autoconfigure.jdbc.DataSourceAutoConfiguration
  security:
    oauth2:
      resourceserver:
        jwt:
          issuer-uri: ${KEYCLOAK_ISSUER_URI:http://localhost:8180/realms/tmpmgmt}

tmpmgmt:
  outbox:
    enabled: false
  rendering:
    libreoffice-binary: ${LIBREOFFICE_BIN:/usr/bin/soffice}
    max-concurrent-conversions: 4
    locale: ${RENDERING_LOCALE:cs-CZ}
    timezone: ${RENDERING_TIMEZONE:Europe/Prague}
    default-currency: ${RENDERING_DEFAULT_CURRENCY:CZK}
    # Path to a Unicode TTF (e.g. DejaVuSans). Without this, Czech diacritics may render
    # as empty boxes in PDFs. Deployers should bundle a font and point this at it.
    pdf-font-path: ${PDF_FONT_PATH:}
    pdf-font-family: ${PDF_FONT_FAMILY:DejaVu Sans}

management:
  endpoints:
    web:
      exposure:
        include: health, info, prometheus

logging:
  pattern:
    level: "%5p [%X{correlationId:-}]"

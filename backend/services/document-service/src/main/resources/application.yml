server:
  port: 8086

spring:
  application:
    name: document-service
  datasource:
    url: ${DOCUMENT_DB_URL:jdbc:postgresql://localhost:5432/document_service}
    username: ${DOCUMENT_DB_USER:document_service}
    password: ${DOCUMENT_DB_PASSWORD:document_service}
  jpa:
    open-in-view: false
    properties:
      hibernate.jdbc.time_zone: UTC
  flyway:
    enabled: true
    baseline-on-migrate: true
  rabbitmq:
    host: ${RABBITMQ_HOST:localhost}
    port: ${RABBITMQ_PORT:5672}
    username: ${RABBITMQ_USER:guest}
    password: ${RABBITMQ_PASSWORD:guest}
  security:
    oauth2:
      resourceserver:
        jwt:
          issuer-uri: ${KEYCLOAK_ISSUER_URI:http://localhost:8180/realms/tmpmgmt}

tmpmgmt:
  outbox:
    enabled: true
    publisher-enabled: true
  minio:
    endpoint: ${MINIO_ENDPOINT:http://localhost:9000}
    access-key: ${MINIO_ACCESS_KEY:minioadmin}
    secret-key: ${MINIO_SECRET_KEY:minioadmin}
    bucket: ${MINIO_BUCKET:tmpmgmt-documents}

management:
  endpoints:
    web:
      exposure:
        include: health, info, prometheus

logging:
  pattern:
    level: "%5p [%X{correlationId:-}]"

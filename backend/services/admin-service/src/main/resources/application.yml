server:
  port: 8087

spring:
  application:
    name: admin-service
  datasource:
    url: ${ADMIN_DB_URL:jdbc:postgresql://localhost:5432/admin_service}
    username: ${ADMIN_DB_USER:admin_service}
    password: ${ADMIN_DB_PASSWORD:admin_service}
  jpa:
    open-in-view: false
    properties:
      hibernate.jdbc.time_zone: UTC
  flyway:
    enabled: true
    baseline-on-migrate: true
  rabbitmq:
    host: ${RABBITMQ_HOST:localhost}
    port: ${RABBITMQ_PORT:5672}
    username: ${RABBITMQ_USER:guest}
    password: ${RABBITMQ_PASSWORD:guest}
  security:
    oauth2:
      resourceserver:
        jwt:
          issuer-uri: ${KEYCLOAK_ISSUER_URI:http://localhost:8180/realms/tmpmgmt}

tmpmgmt:
  outbox:
    enabled: true
    publisher-enabled: true
  keycloak:
    server-url: ${KEYCLOAK_SERVER_URL:http://localhost:8180}
    realm: ${KEYCLOAK_REALM:tmpmgmt}
    admin-client-id: ${KEYCLOAK_ADMIN_CLIENT_ID:admin-service}
    admin-client-secret: ${KEYCLOAK_ADMIN_CLIENT_SECRET:change-me}

management:
  endpoints:
    web:
      exposure:
        include: health, info, prometheus

logging:
  pattern:
    level: "%5p [%X{correlationId:-}]"

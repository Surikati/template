server:
  port: 8081

spring:
  application:
    name: template-service

  datasource:
    url: ${TEMPLATE_DB_URL:jdbc:postgresql://localhost:5432/template_service}
    username: ${TEMPLATE_DB_USER:template_service}
    password: ${TEMPLATE_DB_PASSWORD:template_service}

  jpa:
    open-in-view: false
    properties:
      hibernate.jdbc.time_zone: UTC
      hibernate.jdbc.lob.non_contextual_creation: true

  flyway:
    enabled: true
    baseline-on-migrate: true

  rabbitmq:
    host: ${RABBITMQ_HOST:localhost}
    port: ${RABBITMQ_PORT:5672}
    username: ${RABBITMQ_USER:guest}
    password: ${RABBITMQ_PASSWORD:guest}

  security:
    oauth2:
      resourceserver:
        jwt:
          issuer-uri: ${KEYCLOAK_ISSUER_URI:http://localhost:8180/realms/tmpmgmt}

tmpmgmt:
  outbox:
    enabled: true
    exchange: tmpmgmt.events
    poll-interval: PT2S
    batch-size: 100
    publisher-enabled: true

management:
  endpoints:
    web:
      exposure:
        include: health, info, prometheus
  endpoint:
    health:
      probes:
        enabled: true

logging:
  pattern:
    level: "%5p [%X{correlationId:-}]"

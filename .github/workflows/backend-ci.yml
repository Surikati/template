name: Backend CI

on:
  push:
    branches: [main, develop]
    paths:
      - 'backend/**'
      - '.github/workflows/backend-ci.yml'
  pull_request:
    paths:
      - 'backend/**'
      - '.github/workflows/backend-ci.yml'

concurrency:
  group: backend-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-24.04
    timeout-minutes: 30

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: postgres
        ports: ['5432:5432']
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
      rabbitmq:
        image: rabbitmq:3.13-management-alpine
        ports: ['5672:5672']
        options: >-
          --health-cmd "rabbitmq-diagnostics ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'
          cache: maven

      - name: Verify formatting (Spotless)
        working-directory: backend
        run: ./mvnw -B -pl '!shared/expression-core' spotless:check

      - name: Build + unit + integration tests
        working-directory: backend
        # IT tests run on CI (linux runner = plain dockerd, Testcontainers happy);
        # locally they are skipped by default (skipITs=true in parent pom).
        run: ./mvnw -B verify -DskipITs=false

      - name: Upload test reports
        if: failure()
        uses: actions/upload-artifact@v7
        with:
          name: test-reports
          path: |
            backend/**/target/surefire-reports
            backend/**/target/failsafe-reports

  docker-images:
    needs: build
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-24.04
    timeout-minutes: 30
    strategy:
      matrix:
        service:
          - api-gateway
          - template-service
          - clause-service
          - questionnaire-service
          - assembly-service
          - rendering-service
          - document-service
          - admin-service
          - audit-service
          - search-service
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'
          cache: maven

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build & push image (${{ matrix.service }})
        working-directory: backend
        run: |
          ./mvnw -B -pl services/${{ matrix.service }} -am \
            -Djib.to.image=ghcr.io/${{ github.repository }}/${{ matrix.service }}:${{ github.sha }} \
            -Djib.to.tags=latest \
            compile jib:build

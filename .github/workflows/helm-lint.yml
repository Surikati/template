name: Helm Lint

on:
  push:
    branches: [main, develop]
    paths:
      - 'infra/helm/**'
      - '.github/workflows/helm-lint.yml'
  pull_request:
    paths:
      - 'infra/helm/**'
      - '.github/workflows/helm-lint.yml'

jobs:
  lint:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
      - uses: azure/setup-helm@v4
        with:
          version: v3.16.1

      - name: Lint library chart
        run: helm lint infra/helm/charts/tmpmgmt-service

      - name: Lint service charts
        run: |
          for chart in infra/helm/charts/*/; do
            [ "$(basename "$chart")" = "tmpmgmt-service" ] && continue
            echo "Linting $chart"
            helm dependency update "$chart"
            helm lint "$chart"
          done

      - name: Lint umbrella chart
        run: |
          helm dependency update infra/helm/template-management
          helm lint infra/helm/template-management

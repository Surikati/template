name: Release

on:
  push:
    tags: ['v*.*.*']

jobs:
  release:
    runs-on: ubuntu-24.04
    permissions:
      contents: write
      packages: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'
          cache: maven

      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set version from tag
        run: |
          VERSION=${GITHUB_REF_NAME#v}
          echo "RELEASE_VERSION=$VERSION" >> $GITHUB_ENV

      - name: Build & push all service images
        working-directory: backend
        run: |
          ./mvnw -B versions:set -DnewVersion=${RELEASE_VERSION} -DgenerateBackupPoms=false
          ./mvnw -B -pl '!shared/common-core,!shared/common-web,!shared/outbox-starter,!shared/expression-core' \
            -Djib.to.tags=${RELEASE_VERSION},latest \
            -Djib.to.image=ghcr.io/${{ github.repository }}/{project.artifactId} \
            package jib:build

      - name: Package Helm charts
        run: |
          mkdir -p dist
          for chart in infra/helm/charts/*/; do
            helm dependency update "$chart" || true
            helm package "$chart" --destination dist
          done
          helm dependency update infra/helm/template-management
          helm package infra/helm/template-management --destination dist

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/*.tgz
          generate_release_notes: true

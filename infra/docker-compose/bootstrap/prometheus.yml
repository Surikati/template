global:
  scrape_interval: 15s

scrape_configs:
  - job_name: 'template-management-services'
    metrics_path: /actuator/prometheus
    static_configs:
      - targets:
          - host.docker.internal:8080   # api-gateway
          - host.docker.internal:8081   # template-service
          - host.docker.internal:8082   # clause-service
          - host.docker.internal:8083   # questionnaire-service
          - host.docker.internal:8084   # assembly-service
          - host.docker.internal:8085   # rendering-service
          - host.docker.internal:8086   # document-service
          - host.docker.internal:8087   # admin-service
          - host.docker.internal:8088   # audit-service
          - host.docker.internal:8089   # search-service

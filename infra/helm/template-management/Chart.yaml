apiVersion: v2
name: template-management
description: Template Management — enterprise on-premise template engine (umbrella chart)
type: application
version: 0.1.0
appVersion: "0.1.0"

dependencies:
  # Infrastructure (optional — can be disabled if external instances are used).
  - name: postgresql
    version: 15.5.38
    repository: oci://registry-1.docker.io/bitnamicharts
    condition: postgresql.enabled
  - name: rabbitmq
    version: 14.7.0
    repository: oci://registry-1.docker.io/bitnamicharts
    condition: rabbitmq.enabled
  - name: keycloak
    version: 24.4.3
    repository: oci://registry-1.docker.io/bitnamicharts
    condition: keycloak.enabled
  - name: minio
    version: 14.8.4
    repository: oci://registry-1.docker.io/bitnamicharts
    condition: minio.enabled
  - name: opensearch
    version: 2.27.1
    repository: https://opensearch-project.github.io/helm-charts
    condition: opensearch.enabled

  # Microservices (each consumes the tmpmgmt-service library chart).
  - { name: api-gateway,           version: 0.1.0, repository: "file://../charts/api-gateway" }
  - { name: template-service,      version: 0.1.0, repository: "file://../charts/template-service" }
  - { name: clause-service,        version: 0.1.0, repository: "file://../charts/clause-service" }
  - { name: questionnaire-service, version: 0.1.0, repository: "file://../charts/questionnaire-service" }
  - { name: assembly-service,      version: 0.1.0, repository: "file://../charts/assembly-service" }
  - { name: rendering-service,     version: 0.1.0, repository: "file://../charts/rendering-service" }
  - { name: document-service,      version: 0.1.0, repository: "file://../charts/document-service" }
  - { name: admin-service,         version: 0.1.0, repository: "file://../charts/admin-service" }
  - { name: audit-service,         version: 0.1.0, repository: "file://../charts/audit-service" }
  - { name: search-service,        version: 0.1.0, repository: "file://../charts/search-service" }
